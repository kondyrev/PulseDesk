<svg xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc">
  <title id="title">Логотип ПУЛЬС — версия 4</title>
  <desc id="desc">
    Открытая широкая скруглённая рамка из верхней и нижней частей.
    На боковых разрывах расположены точки мастера и клиента.
    Между ними проходит отдельный импульс общения.
  </desc>

  <!-- Верхняя половина рамки -->
  <path
    d="M84 214 V150
       C84 90 134 42 196 42
       H316
       C378 42 428 90 428 150
       V214"
    fill="none"
    stroke="#111827"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Нижняя половина рамки -->
  <path
    d="M84 298 V362
       C84 422 134 470 196 470
       H316
       C378 470 428 422 428 362
       V298"
    fill="none"
    stroke="#111827"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Мастер и клиент -->
  <circle cx="56" cy="256" r="17" fill="#16A34A"/>
  <circle cx="456" cy="256" r="17" fill="#111827"/>

  <!-- Импульс общения -->
  <path
    d="M100 256
       H186
       L218 256
       L252 184
       L286 326
       L320 256
       H412"
    fill="none"
    stroke="#16A34A"
    stroke-width="23"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
